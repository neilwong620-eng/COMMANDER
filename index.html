<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人理財管理系統</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; font-size: 1rem; color: #666; }
        .balance { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #2c3e50; color: white; }
        .stock-account { border-left: 5px solid #e74c3c; }
        .positive { color: #27ae60; }
        .negative { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>資產帳戶概覽</h2>
    
    <div class="grid" id="account-display">
        </div>

    <hr>

    <h2>股票投資清單</h2>
    <table>
        <thead>
            <tr>
                <th>代號/名稱</th>
                <th>持有股數</th>
                <th>平均成本</th>
                <th>目前市價</th>
                <th>預估市值</th>
                <th>損益狀況</th>
            </tr>
        </thead>
        <tbody id="stock-list">
            </tbody>
    </table>
</div>

<script>
    // 1. 設定帳戶資料 (4個一般 + 1個股票)
    const accounts = [
        { name: "薪轉帳戶", balance: 50000, type: "cash" },
        { name: "生活開支", balance: 12000, type: "cash" },
        { name: "緊急預備金", balance: 100000, type: "cash" },
        { name: "海外儲蓄", balance: 3500, type: "cash" }, // 假設美金
        { name: "證券交割戶", balance: 8500, type: "stock_cash" } 
    ];

    // 2. 設定股票庫存
    const stocks = [
        { code: "2330 台積電", shares: 500, cost: 620, currentPrice: 780 },
        { code: "AAPL", shares: 10, cost: 175, currentPrice: 190 },
        { code: "0050 元大台灣50", shares: 1000, cost: 135, currentPrice: 158 }
    ];

    function updateUI() {
        const accountContainer = document.getElementById('account-display');
        const stockContainer = document.getElementById('stock-list');
        let totalStockMarketValue = 0;

        // 計算股票市值
        stockContainer.innerHTML = "";
        stocks.forEach(s => {
            const marketValue = s.shares * s.currentPrice;
            const profit = (s.currentPrice - s.cost) * s.shares;
            const profitPct = (((s.currentPrice / s.cost) - 1) * 100).toFixed(2);
            totalStockMarketValue += marketValue;

            stockContainer.innerHTML += `
                <tr>
                    <td>**${s.code}**</td>
                    <td>${s.shares}</td>
                    <td>$${s.cost}</td>
                    <td>$${s.currentPrice}</td>
                    <td>$${marketValue.toLocaleString()}</td>
                    <td class="${profit >= 0 ? 'positive' : 'negative'}">
                        ${profit >= 0 ? '+' : ''}${profit.toLocaleString()} (${profitPct}%)
                    </td>
                </tr>
            `;
        });

        // 渲染帳戶卡片
        accountContainer.innerHTML = "";
        accounts.forEach(acc => {
            let displayBalance = acc.balance;
            let extraClass = "";
            
            // 如果是股票帳戶，顯示 (現金 + 股票市值)
            if (acc.type === "stock_cash") {
                displayBalance = acc.balance + totalStockMarketValue;
                extraClass = "stock-account";
            }

            accountContainer.innerHTML += `
                <div class="card ${extraClass}">
                    <h3>${acc.name}</h3>
                    <div class="balance">$${displayBalance.toLocaleString()}</div>
                    ${acc.type === 'stock_cash' ? '<small style="color:gray">含股票市值</small>' : ''}
                </div>
            `;
        });
    }

    updateUI();
</script>

</body>
</html>
